# =============================================================================
# Inventory for the Isochrone dev VM
# =============================================================================
# Point this at your fresh VM. The user must be able to sudo (become).
#
# Run against a remote VM:
#   ansible-inventory -i inventory.ini --host dev_vm
#
# Run against the box you're sitting on (no SSH):
#   ansible-playbook -i inventory.ini playbook.yml \
#     -e "ansible_connection=local" -l dev_vm
# =============================================================================

[isochrone_dev]
dev_vm ansible_host=192.168.0.150 ansible_user=nathan

[isochrone_dev:vars]
ansible_python_interpreter=/usr/bin/python3
