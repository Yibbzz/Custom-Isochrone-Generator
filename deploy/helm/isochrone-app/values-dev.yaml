# Dev overrides:  helm upgrade --install isochrone-dev ./isochrone-app -f isochrone-app/values-dev.yaml

image:
  registry: 192.168.0.202:5000
  repository: isochrone-app
  tag: 45986854f3e6
django:
  djangoEnv: ""
  initPermissionsCommand: "chmod -R 777 /webapp/myapp/media/user_osm_files"
  # Dev runs without the pod-level UID/GID pinning (matches django-dev.yaml)
  podSecurityContext: {}
  containerSecurityContext:
    allowPrivilegeEscalation: true
    capabilities:
      add: ["NET_ADMIN", "NET_RAW"]
    readOnlyRootFilesystem: false
ingress:
  host: custom-isochrones.local
  entrypoint: web
  tls: false
# values-dev.yaml
# values-dev.yaml — cloudflared block
cloudflared:
  enabled: true
  namespace: cloudflared
  tunnelId: c56f06bf-b587-465e-9454-f9e7bd841771
  credentialsSecret: cloudflared-dev-creds
  credentialsFileName: credentials.json
  originCertSecret: ""
  ingress:
    - {hostname: woodpecker-dev.geogsocfcform.top, service: "http://woodpecker-server.woodpecker.svc.cluster.local:80"}
metallb:
  enabled: false
woodpecker:
  enabled: true
  host: https://woodpecker-dev.geogsocfcform.top
  adminUser: Yibbzz # your GitHub login (the repo owner) = the admin
  githubClient: Ov23liKOQhErV2AzW4PT
