{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: {{ include "isochrone.ns" . }}
type: Opaque
stringData:
  POSTGRES_USER: {{ required "secrets.postgres.user is required when secrets.create=true" .Values.secrets.postgres.user | quote }}
  POSTGRES_PASSWORD: {{ required "secrets.postgres.password is required when secrets.create=true" .Values.secrets.postgres.password | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: django-secret
  namespace: {{ include "isochrone.ns" . }}
type: Opaque
stringData:
  DJANGO_SECRET_KEY: {{ required "secrets.django.secretKey is required when secrets.create=true" .Values.secrets.django.secretKey | quote }}
{{- end }}
