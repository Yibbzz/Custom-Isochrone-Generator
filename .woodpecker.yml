when:
  - event: push
    branch: main

steps:
  - name: gitleaks
    image: ghcr.io/gitleaks/gitleaks:latest
    commands:
      - gitleaks detect --source . --redact -v

  - name: build-and-push
    image: quay.io/buildah/stable
    privileged: true
    backend_options:
      kubernetes:
        securityContext:
          privileged: true
    environment:
      STORAGE_DRIVER: vfs
    commands:
      - export TAG=${CI_COMMIT_SHA:0:12}
      - export REG=192.168.0.202:5000
      - buildah bud -f docker/Dockerfile.dev -t $REG/isochrone-app:$TAG .
      - buildah push --tls-verify=false $REG/isochrone-app:$TAG

  - name: trivy-scan
    image: aquasec/trivy:latest
    commands:
      - export TAG=${CI_COMMIT_SHA:0:12}
      - export REG=192.168.0.202:5000
      - trivy image --insecure --exit-code 0 --severity HIGH,CRITICAL --ignore-unfixed $REG/isochrone-app:$TAG

  - name: update-gitops-tag
    image: alpine/git
    environment:
      GITOPS_SSH_KEY:
        from_secret: gitops_ssh_key
    commands:
      - export TAG=${CI_COMMIT_SHA:0:12}
      - mkdir -p ~/.ssh
      - echo "$GITOPS_SSH_KEY" > ~/.ssh/id_ed25519
      - chmod 600 ~/.ssh/id_ed25519
      - ssh-keyscan github.com >> ~/.ssh/known_hosts
      - git clone git@github.com:Yibbzz/homelab-gitops.git /tmp/gitops
      - cd /tmp/gitops/homelab-gitops
      - apk add --no-cache yq
      - yq -i ".image.tag = \"$TAG\"" apps/isochrone/dev.yaml
      - git config user.email "woodpecker@ci"
      - git config user.name "Woodpecker CI"
      - "git commit -am 'chore: deploy isochrone $TAG [skip ci]'"
      - git push origin main